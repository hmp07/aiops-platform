services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aiops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    image: aiops-platform-api:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aiops:${DB_PASSWORD:-aiops}@postgres:5432/aiops
      DATABASE_SYNC_URL: postgresql://aiops:${DB_PASSWORD:-aiops}@postgres:5432/aiops
      REDIS_URL: redis://redis:6379/0
      REDIS_CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_CELERY_RESULT_URL: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    image: aiops-platform-celery-worker:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://aiops:${DB_PASSWORD:-aiops}@postgres:5432/aiops
      REDIS_URL: redis://redis:6379/0
      REDIS_CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_CELERY_RESULT_URL: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
    command: celery -A app.core.scheduler.celery_app worker -l info -c 4

  celery-beat:
    image: aiops-platform-celery-beat:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://aiops:${DB_PASSWORD:-aiops}@postgres:5432/aiops
      REDIS_URL: redis://redis:6379/0
      REDIS_CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_CELERY_RESULT_URL: redis://redis:6379/2
    command: celery -A app.core.scheduler.celery_app beat -l info

  frontend:
    image: aiops-platform-frontend:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
